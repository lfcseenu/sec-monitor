name: Weekly Summary Agent
on:
  schedule:
    # Runs at 9:00 AM Pacific Time every Saturday
    - cron: '0 16 * * 6' 
  workflow_dispatch: # Allows you to run it manually for testing
jobs:
  run-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Summary
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          pip install requests
          python sec_agent.py --weekly
