name: Twice Daily Summary Agent
on:
  schedule:
    - cron: '0 16 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  run-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Summary
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          pip install requests
          python sec_agent.py --summary
